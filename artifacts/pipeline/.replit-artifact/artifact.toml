kind = "web"
previewPath = "/"
title = "Sales Pipeline"
version = "1.0.0"
id = "artifacts/pipeline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21337

[services.development]
run = "pnpm --filter @workspace/pipeline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/pipeline", "run", "build" ]
publicDir = "artifacts/pipeline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21337"
BASE_PATH = "/"
